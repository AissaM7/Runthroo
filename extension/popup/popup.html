<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runthroo Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 1L3 12L6.5 8.5L10 14L12 13L8.5 7L13 6L3 1Z" fill="white" stroke="white" stroke-width="0.5"
            stroke-linejoin="round" />
        </svg>
      </div>
      <span class="logo-text">Runthroo</span>
    </div>
    <div class="status">
      <span id="status-dot" class="dot dot-red"></span>
      <span id="status-text">Checking…</span>
    </div>
  </div>

  <!-- Top highlight line -->
  <div class="header-accent"></div>

  <!-- Form -->
  <div class="form">
    <div class="field">
      <label for="platform">Platform</label>
      <input type="text" id="platform" placeholder="e.g. embrace, honeycomb" />
    </div>
    <div class="field">
      <label for="page-label">Page Label</label>
      <input type="text" id="page-label" placeholder="Auto-filled from page title" />
    </div>
    <button id="capture-btn" class="btn-capture" disabled>
      <svg class="btn-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" />
        <circle cx="8" cy="8" r="3" fill="currentColor" />
      </svg>
      <span id="capture-btn-text">Capture This Page</span>
    </button>
    <div id="toast" class="toast hidden"></div>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- History -->
  <div class="history-section">
    <div class="history-title">Recent Captures</div>
    <ul id="history-list"></ul>
    <div id="empty-history" class="empty-state">No captures yet — start by capturing a page above.</div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
